# App runs on the same port used in our live-coded projects
server.port=9000

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/Inventory_Api?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
